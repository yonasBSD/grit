name: Release

on:
  push:
    tags:
      - "v*"
  # Allow kicking off a manual test build from the Actions tab. These runs build
  # and upload the artifacts but do not publish a GitHub Release (see the
  # `release` job's `if` guard below).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Statically-linked musl builds (portable across distros, e.g. Alpine).
          # Built with `cross` so the right musl C toolchain is provided for
          # native dependencies (e.g. ring) on both architectures.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p grit-cli -p grit-simple

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p grit-cli -p grit-simple

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../grit-${{ matrix.target }}.tar.gz grit
          tar czf ../../../gi-${{ matrix.target }}.tar.gz gi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grit-${{ matrix.target }}
          path: |
            grit-${{ matrix.target }}.tar.gz
            gi-${{ matrix.target }}.tar.gz

  # Windows ships the `grit-simple` CLI (the `gi` binary), installed via
  # `irm grit-scm.com/install.ps1 | iex` (see docs/install.ps1).
  build-windows:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      # The repo's logs/ directory contains files with ':' in their names, which
      # are invalid on NTFS and abort `git checkout` on Windows. Sparse-checkout
      # everything except logs/ — the build doesn't need it.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/logs/
          sparse-checkout-cone-mode: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p grit-simple

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gi.exe -DestinationPath gi-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gi-${{ matrix.target }}
          path: gi-${{ matrix.target }}.zip

  release:
    needs: [build, build-windows]
    # Only publish a GitHub Release for tag pushes. Manual (workflow_dispatch)
    # runs stop after the build jobs, leaving the artifacts on the run to download.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            grit-*.tar.gz
            gi-*.zip
