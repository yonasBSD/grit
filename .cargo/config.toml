# Cap build parallelism to 2 jobs.
#
# grit is developed with many git worktrees built concurrently (one per
# parallel agent/lane). Cargo defaults to one job per CPU core, so N
# simultaneous worktree builds oversubscribe the machine by ~N x cores and
# thrash (load >100 on an 8-core box, builds slowing from ~90s to 15-20min).
# Capping jobs keeps concurrent builds cooperative. Override for a one-off
# different setting with `cargo build -jN` or CARGO_BUILD_JOBS=N; for a fast
# single build, use `cargo build -j16` or CARGO_BUILD_JOBS=16.
[build]
jobs = 2
